<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>CSS Methods</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <p>I'm just a paragraph with extra bold text!</p>

        <p class="smaller">I'm a smaller paragraph, also with extra bold text!</p>

        <button class="border green">Confirm</button>

        <button class="border white">Cancel</button>

        <div class="thin">I'm a div with thin text!
            <div class="child">I'm a div with thin text and a child div!</div>
            <div class="smaller">I'm a smaller child div with extra bold text.</div>
        </div>
    </body>
</html>
